openapi: 3.0.3
info:
  title: SEAPEDIA API
  version: 1.0.0
  description: Multi-role marketplace API
paths:
  /api/v1/admin/jobs/:
    get:
      operationId: v1_admin_jobs_retrieve
      description: 'Admin: list all delivery jobs.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryJob'
          description: ''
  /api/v1/admin/orders/:
    get:
      operationId: v1_admin_orders_retrieve
      description: 'Admin: list all orders.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/v1/admin/overdue/:
    get:
      operationId: v1_admin_overdue_retrieve
      description: 'Admin: list orders that have breached their SLA.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/v1/admin/products/:
    get:
      operationId: v1_admin_products_retrieve
      description: 'Admin: list all products.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPublic'
          description: ''
  /api/v1/admin/promos/:
    get:
      operationId: admin_promos_list
      description: 'Admin: list all promos and create new ones.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Promo'
          description: ''
    post:
      operationId: v1_admin_promos_create
      description: 'Admin: list all promos and create new ones.'
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromoCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PromoCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PromoCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promo'
          description: ''
  /api/v1/admin/promos/{id}/:
    get:
      operationId: admin_promos_retrieve
      description: 'Admin: retrieve a single promo.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promo'
          description: ''
  /api/v1/admin/simulate-next-day/:
    post:
      operationId: v1_admin_simulate_next_day_create
      description: 'Admin: trigger overdue order processing (simulates day advancement).'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSimulateNextDayResponse'
          description: ''
  /api/v1/admin/stats/:
    get:
      operationId: v1_admin_stats_retrieve
      description: High-level platform statistics.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
          description: ''
  /api/v1/admin/stores/:
    get:
      operationId: v1_admin_stores_retrieve
      description: 'Admin: list all stores.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorePublic'
          description: ''
  /api/v1/admin/users/:
    get:
      operationId: v1_admin_users_retrieve
      description: 'Admin: list all users with their roles.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/v1/admin/vouchers/:
    get:
      operationId: admin_vouchers_list
      description: 'Admin: list all vouchers and create new ones.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Voucher'
          description: ''
    post:
      operationId: v1_admin_vouchers_create
      description: 'Admin: list all vouchers and create new ones.'
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VoucherCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VoucherCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voucher'
          description: ''
  /api/v1/admin/vouchers/{id}/:
    get:
      operationId: admin_vouchers_retrieve
      description: 'Admin: retrieve a single voucher.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voucher'
          description: ''
  /api/v1/auth/addresses/:
    get:
      operationId: v1_auth_addresses_list
      description: List or create delivery addresses for the active buyer.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryAddress'
          description: ''
    post:
      operationId: v1_auth_addresses_create
      description: List or create delivery addresses for the active buyer.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryAddress'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeliveryAddress'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeliveryAddress'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryAddress'
          description: ''
  /api/v1/auth/addresses/{id}/:
    get:
      operationId: v1_auth_addresses_retrieve
      description: Retrieve, update, or delete a specific delivery address.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryAddress'
          description: ''
    patch:
      operationId: v1_auth_addresses_partial_update
      description: Retrieve, update, or delete a specific delivery address.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDeliveryAddress'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDeliveryAddress'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDeliveryAddress'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryAddress'
          description: ''
    delete:
      operationId: v1_auth_addresses_destroy
      description: Retrieve, update, or delete a specific delivery address.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Obtain JWT token pair
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: Blacklist the refresh token
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      description: Current authenticated user profile
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: v1_auth_register_create
      description: Register a new user
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/v1/auth/role-switch/:
    post:
      operationId: v1_auth_role_switch_create
      description: Issue a new token pair with a different active_role
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleSwitch'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RoleSwitch'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RoleSwitch'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleSwitchResponse'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/buyer/reports/:
    get:
      operationId: v1_buyer_reports_retrieve
      description: Buyer spending summary.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerSpendingReport'
          description: ''
  /api/v1/cart/:
    get:
      operationId: v1_cart_retrieve
      description: Get the buyer's cart summary.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    delete:
      operationId: v1_cart_destroy
      description: Get the buyer's cart summary.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/cart/items/:
    post:
      operationId: v1_cart_items_create
      description: Add a product to cart, enforcing single-store rule.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddToCart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddToCart'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /api/v1/cart/items/{id}/:
    patch:
      operationId: v1_cart_items_partial_update
      description: Update quantity or remove a cart item.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCartItem'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCartItem'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateCartItem'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
    delete:
      operationId: v1_cart_items_destroy
      description: Update quantity or remove a cart item.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/checkout/:
    post:
      operationId: v1_checkout_create
      description: 'Create an order: atomically debit wallet, reduce stock, apply
        discount.'
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Checkout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Checkout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Checkout'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/v1/checkout/preview/:
    post:
      operationId: v1_checkout_preview_create
      description: Return a price breakdown without committing any changes.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutPreview'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CheckoutPreview'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CheckoutPreview'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutPreviewResponse'
          description: ''
  /api/v1/discounts/promos/:
    get:
      operationId: v1_discounts_promos_list
      description: List all currently valid promos for buyers.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Promo'
          description: ''
  /api/v1/discounts/validate/:
    post:
      operationId: v1_discounts_validate_create
      description: Validate a discount code without applying it.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscountValidate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscountValidate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscountValidate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscountValidateResponse'
          description: ''
  /api/v1/discounts/vouchers/:
    get:
      operationId: v1_discounts_vouchers_list
      description: List all currently valid vouchers for buyers.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Voucher'
          description: ''
  /api/v1/driver/earnings/:
    get:
      operationId: v1_driver_earnings_retrieve
      description: Driver earnings summary.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverEarnings'
          description: ''
  /api/v1/driver/history/:
    get:
      operationId: v1_driver_history_list
      description: Driver's past completed jobs.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryJob'
          description: ''
  /api/v1/driver/jobs/:
    get:
      operationId: v1_driver_jobs_list
      description: List available delivery jobs (order status = Menunggu Pengirim).
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryJob'
          description: ''
  /api/v1/driver/jobs/{id}/:
    get:
      operationId: v1_driver_jobs_retrieve
      description: Get detail of a delivery job.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryJob'
          description: ''
  /api/v1/driver/jobs/{id}/complete/:
    post:
      operationId: v1_driver_jobs_complete_create
      description: Driver marks job as completed → order Pesanan Selesai.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryJob'
          description: ''
  /api/v1/driver/jobs/{id}/take/:
    post:
      operationId: v1_driver_jobs_take_create
      description: Driver takes an available job — atomic + select_for_update.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryJob'
          description: ''
  /api/v1/orders/:
    get:
      operationId: v1_orders_list
      description: List the authenticated buyer's orders.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
          description: ''
  /api/v1/orders/{id}/:
    get:
      operationId: v1_orders_retrieve
      description: Retrieve a single order belonging to the authenticated buyer.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
  /api/v1/products/:
    get:
      operationId: v1_products_list
      description: List active products (public). Supports ?search= and ?store= filters.
      tags:
      - v1
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductPublic'
          description: ''
  /api/v1/products/{id}/:
    get:
      operationId: v1_products_retrieve
      description: Retrieve a single active product by ID (public).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPublic'
          description: ''
  /api/v1/products/seller/:
    get:
      operationId: v1_products_seller_list
      description: List or create the seller's own products.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
          description: ''
    post:
      operationId: v1_products_seller_create
      description: List or create the seller's own products.
      tags:
      - v1
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Product'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Product'
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /api/v1/products/seller/{id}/:
    get:
      operationId: v1_products_seller_retrieve
      description: Retrieve, update, or delete a seller's own product.
      parameters:
      - in: path
        name: id
        schema:
