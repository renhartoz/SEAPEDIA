components:
  schemas:
    AddToCart:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
      required:
      - product_id
      - quantity
    AdminSimulateNextDayResponse:
      type: object
      properties:
        processed_count:
          type: integer
        processed_order_ids:
          type: array
          items:
            type: string
            format: uuid
      required:
      - processed_count
      - processed_order_ids
    AdminStats:
      type: object
      properties:
        users:
          type: integer
        stores:
          type: integer
        products:
          type: integer
        orders:
          type: integer
        delivery_jobs:
          type: integer
        vouchers:
          type: integer
        promos:
          type: integer
      required:
      - delivery_jobs
      - orders
      - products
      - promos
      - stores
      - users
      - vouchers
    AppReview:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reviewer_name:
          type: string
          maxLength: 100
        rating:
          type: integer
          maximum: 5
          minimum: 1
        comment:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - comment
      - created_at
      - id
      - rating
      - reviewer_name
    BuyerSpendingReport:
      type: object
      properties:
        order_count:
          type: integer
        total_spent:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        total_discount_saved:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        total_ppn_paid:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        total_delivery_paid:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
      required:
      - order_count
      - orders
      - total_delivery_paid
      - total_discount_saved
      - total_ppn_paid
      - total_spent
    Cart:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        store_id:
          type: string
          format: uuid
          readOnly: true
        store_name:
          type: string
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        item_count:
          type: integer
          readOnly: true
        subtotal:
          type: number
          format: double
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - item_count
      - items
      - store_id
      - store_name
      - subtotal
      - updated_at
    CartItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/ProductPublic'
          readOnly: true
        product_id:
          type: string
          format: uuid
          writeOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        subtotal:
          type: number
          format: double
          readOnly: true
      required:
      - id
      - product
      - product_id
      - subtotal
    Checkout:
      type: object
      properties:
        address_id:
          type: string
          format: uuid
        delivery_method:
          $ref: '#/components/schemas/DeliveryMethodEnum'
        discount_code:
          type: string
          default: ''
      required:
      - address_id
      - delivery_method
    CheckoutPreview:
      type: object
      properties:
        delivery_method:
          $ref: '#/components/schemas/DeliveryMethodEnum'
        discount_code:
          type: string
          default: ''
      required:
      - delivery_method
    CheckoutPreviewResponse:
      type: object
      properties:
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        delivery_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        discount_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        ppn_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - delivery_fee
      - discount_amount
      - ppn_amount
      - subtotal
      - total
    CustomTokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    DeliveryAddress:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        label:
          type: string
          maxLength: 50
        recipient_name:
          type: string
          maxLength: 100
        phone:
          type: string
          maxLength: 20
        street:
          type: string
        city:
          type: string
          maxLength: 100
        province:
          type: string
          maxLength: 100
        postal_code:
          type: string
          maxLength: 10
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - city
      - created_at
      - id
      - label
      - phone
      - postal_code
      - province
      - recipient_name
      - street
    DeliveryJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        order:
          allOf:
          - $ref: '#/components/schemas/Order'
          readOnly: true
        driver_username:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/DeliveryJobStatusEnum'
        taken_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        driver_earnings:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - driver_username
      - id
      - order
    DeliveryJobStatusEnum:
      enum:
      - available
      - taken
      - completed
      type: string
      description: |-
        * `available` - Available
        * `taken` - Taken
        * `completed` - Completed
    DeliveryMethodEnum:
      enum:
      - instant
      - next_day
      - regular
      type: string
      description: |-
        * `instant` - Instant
        * `next_day` - Next Day
        * `regular` - Regular
    DiscountTypeEnum:
      enum:
      - percentage
      - fixed
      type: string
      description: |-
        * `percentage` - Percentage
        * `fixed` - Fixed
    DiscountValidate:
      type: object
      properties:
        code:
          type: string
          maxLength: 50
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          default: '0.00'
      required:
      - code
    DiscountValidateResponse:
      type: object
